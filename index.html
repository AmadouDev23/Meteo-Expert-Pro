<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo Expert Pro</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        /* --- CONFIGURATION GÉNÉRALE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            transition: background 0.8s ease;
            color: #2c3e50; padding: 20px;
        }

        /* --- FONDS DYNAMIQUES --- */
        body.sunny { background: linear-gradient(135deg, #F2994A, #F2C94C); }
        body.cloudy { background: linear-gradient(135deg, #606c88, #3f4c6b); }
        body.rainy { background: linear-gradient(135deg, #4b6cb7, #182848); }
        body.snowy { background: linear-gradient(135deg, #E6DADA, #274046); }

        #app { width: 100%; display: flex; justify-content: center; }
    </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
